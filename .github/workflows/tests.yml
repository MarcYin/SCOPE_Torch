name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_gpu:
        description: "Run the optional GPU test job on a self-hosted CUDA runner"
        required: false
        default: false
        type: boolean
      run_matlab:
        description: "Run the optional MATLAB parity jobs on a self-hosted MATLAB runner"
        required: false
        default: false
        type: boolean

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-cpu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run test suite
        run: PYTHONPATH=src python -m pytest -q

  unit-gpu:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_gpu }}
    runs-on: [self-hosted, linux, x64, gpu]
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Show GPU environment
        run: |
          nvidia-smi
          python -c "import torch; print('torch', torch.__version__); print('cuda_available', torch.cuda.is_available()); print('device_count', torch.cuda.device_count())"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run full suite with CUDA checks enabled
        env:
          PYTHONPATH: src
        run: python -m pytest -q

  parity-matlab:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_matlab }}
    runs-on: [self-hosted, matlab]
    timeout-minutes: 120
    env:
      MATLAB_BIN: ${{ vars.MATLAB_BIN != '' && vars.MATLAB_BIN || 'matlab' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Show MATLAB environment
        run: |
          "$MATLAB_BIN" -batch "disp(version)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run MATLAB parity tests
        env:
          PYTHONPATH: src
          SCOPE_BENCHMARK: "1"
          SCOPE_TIMESERIES_BENCHMARK: "1"
        run: python -m pytest -q tests/test_scope_benchmark_parity.py tests/test_scope_timeseries_benchmark_parity.py
