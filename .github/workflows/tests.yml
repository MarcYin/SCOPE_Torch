name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_gpu:
        description: "Run the optional GPU test job on a self-hosted CUDA runner"
        required: false
        default: false
        type: boolean
      run_matlab:
        description: "Run the optional MATLAB parity jobs on a self-hosted MATLAB runner"
        required: false
        default: false
        type: boolean

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UPSTREAM_SCOPE_COMMIT: e4c2e5109a309e6d2636fd6aa33e0e54b6dd88de

jobs:
  unit-cpu:
    name: Python suite (required CPU)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch pinned upstream SCOPE assets
        run: |
          if [ ! -d upstream/SCOPE ]; then
            git clone https://github.com/Christiaanvandertol/SCOPE.git upstream/SCOPE
          fi
          git -C upstream/SCOPE fetch --depth 1 origin "$UPSTREAM_SCOPE_COMMIT"
          git -C upstream/SCOPE checkout "$UPSTREAM_SCOPE_COMMIT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run test suite with coverage
        run: PYTHONPATH=src python -m pytest -q --cov=scope --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.14'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    name: Lint & type check (required)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run ruff linter
        run: ruff check src/ tests/

      - name: Run ruff formatter check
        run: ruff format --check src/ tests/

      - name: Run mypy
        run: mypy src/scope/ --ignore-missing-imports

  docs-build:
    name: Docs build (required)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"

      - name: Build documentation
        run: mkdocs build --strict

  unit-gpu:
    name: GPU suite (opt-in self-hosted)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_gpu }}
    runs-on: [self-hosted, linux, x64, gpu]
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch pinned upstream SCOPE assets
        run: |
          if [ ! -d upstream/SCOPE ]; then
            git clone https://github.com/Christiaanvandertol/SCOPE.git upstream/SCOPE
          fi
          git -C upstream/SCOPE fetch --depth 1 origin "$UPSTREAM_SCOPE_COMMIT"
          git -C upstream/SCOPE checkout "$UPSTREAM_SCOPE_COMMIT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Show GPU environment
        run: |
          nvidia-smi
          python -c "import torch; print('torch', torch.__version__); print('cuda_available', torch.cuda.is_available()); print('device_count', torch.cuda.device_count())"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run full suite with CUDA checks enabled
        env:
          PYTHONPATH: src
        run: python -m pytest -q

  parity-matlab:
    name: MATLAB parity (opt-in self-hosted)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_matlab }}
    runs-on: [self-hosted, matlab]
    timeout-minutes: 120
    env:
      MATLAB_BIN: ${{ vars.MATLAB_BIN != '' && vars.MATLAB_BIN || 'matlab' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch pinned upstream SCOPE assets
        run: |
          if [ ! -d upstream/SCOPE ]; then
            git clone https://github.com/Christiaanvandertol/SCOPE.git upstream/SCOPE
          fi
          git -C upstream/SCOPE fetch --depth 1 origin "$UPSTREAM_SCOPE_COMMIT"
          git -C upstream/SCOPE checkout "$UPSTREAM_SCOPE_COMMIT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Show MATLAB environment
        run: |
          "$MATLAB_BIN" -batch "disp(version)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run MATLAB parity tests
        env:
          PYTHONPATH: src
          SCOPE_REQUIRE_MATLAB: "1"
        run: python -m pytest -q tests/test_scope_benchmark_parity.py tests/test_scope_timeseries_benchmark_parity.py
