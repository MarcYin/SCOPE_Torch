site_name: SCOPE
site_description: PyTorch-first implementation of the SCOPE canopy radiative transfer model.
repo_name: scope

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Model Mechanics: model-mechanics.md
  - Input / Output Reference: input-output-reference.md
  - Examples: examples.md
  - Production Notes: production-notes.md
  - Benchmark Policy: benchmark-policy.md
