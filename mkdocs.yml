site_name: SCOPE
site_description: PyTorch-first implementation of the SCOPE canopy radiative transfer model.
repo_name: scope

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Model Mechanics: model-mechanics.md
  - Input / Output Reference: input-output-reference.md
  - Variable Glossary: variable-glossary.md
  - Workflow Variables:
      - Reflectance: workflow-variables/reflectance.md
      - Fluorescence: workflow-variables/fluorescence.md
      - Thermal: workflow-variables/thermal.md
      - Energy Balance: workflow-variables/energy-balance.md
  - Leaf Angle Distribution: leaf-angle-distribution.md
  - Examples: examples.md
  - Production Notes: production-notes.md
  - Releasing: releasing.md
  - Benchmark Policy: benchmark-policy.md
